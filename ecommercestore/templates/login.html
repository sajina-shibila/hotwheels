<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #121212, #1db954);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #181818;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            text-align: center;
        }

        .login-box h2 {
            color: #1db954;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: none;
            border-radius: 6px;
            background: #282828;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border: 1px solid #1db954;
            background: #333;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #1db954;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #17a44b;
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="email" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Log In</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
