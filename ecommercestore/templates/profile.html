<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #eee;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0;
            color: #333;
        }

        .info {
            margin-top: 20px;
            text-align: left;
        }

        .info p {
            padding: 10px;
            border-bottom: 1px solid #eee;
            margin: 0;
        }

        .info span {
            font-weight: bold;
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            background: #2575fc;
            color: #fff;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1a5edb;
        }

        .logout {
            background: #e74c3c;
        }

        .logout:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/100" alt="Profile Image" class="profile-img">

    <h2>{{ user.username }}</h2>
    <p style="color: gray;">{{ user.email }}</p>

    <div class="info" id="profileInfo">
        <p><span>Username:</span> {{ user.username }}</p>
        <p><span>Email:</span> {{ user.email }}</p>
        <p><span>Joined:</span> {{ user.date_joined }}</p>
        <p><span>Last Login:</span> {{ user.last_login }}</p>
    </div>

    <form method="POST" action="" id="editForm" style="display:none;">
        {% csrf_token %}
        <div class="info">
            <p>
                <span>Name:</span><br>
                <input type="text" name="name" value="{{ user.name }}" style="width:100%; padding:8px;">
            </p>
            <p>
                <span>Phone:</span><br>
                <input type="text" name="phone" value="{{ user.phone }}" style="width:100%; padding:8px;">
            </p>
            <p>
                <span>Location:</span><br>
                <input type="text" name="location" value="{{ user.address }}" style="width:100%; padding:8px;">
            </p>
        </div>
        <button type="submit" class="btn">Save Changes</button>
    </form>

    <a href="javascript:void(0);" class="btn" onclick="toggleEdit()">Edit Profile</a>
    <a href="/logout/" class="btn logout">Logout</a>
</div>

<script>
function toggleEdit() {
    var form = document.getElementById("editForm");
    var info = document.getElementById("profileInfo");

    if (form.style.display === "none") {
        form.style.display = "block";
        info.style.display = "none";
    } else {
        form.style.display = "none";
        info.style.display = "block";
    }
}
</script>

</body>
</html>
